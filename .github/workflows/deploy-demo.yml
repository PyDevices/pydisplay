name: Deploy PyScript demo to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'html/**'
      - 'src/**'
      - 'demo-pages/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble GitHub Pages site
        run: |
          mkdir -p _site/demo
          cp index.html _site/demo/
          cp -r html _site/demo/
          # pyscript.toml mounts ../src/* relative to html/ — library files must
          # be served at demo/src/ on GitHub Pages (serve.py serves repo root locally).
          cp -r src _site/demo/src
          cp demo-pages/index.html _site/index.html
          cp demo-pages/site.css _site/site.css

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
