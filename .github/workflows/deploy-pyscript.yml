name: Deploy PyScript site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - 'src/**'
      - 'packages/**'
      - 'scripts/install_gen_manifests.py'
      - 'scripts/install_refresh_manifests.sh'
      - 'scripts/pyscript_gen_packages.py'
      - 'scripts/pyscript_stamp_pwa_cache.py'
      - '.github/workflows/deploy-pyscript.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Verify install manifest freshness
        run: ./scripts/install_refresh_manifests.sh --audit

      - name: Verify PyScript gallery manifests
        run: python scripts/pyscript_gen_packages.py --check

      - name: Assemble GitHub Pages site
        run: |
          mkdir -p _site/pyscript
          cp -r web/pyscript/* _site/pyscript/
          # web/pyscript/src and web/pyscript/packages are symlinks for local
          # dev; replace with real trees for GitHub Pages.
          rm -rf _site/pyscript/src _site/pyscript/packages
          mkdir -p _site/pyscript/src _site/pyscript/packages
          cp -r src/lib src/add_ons _site/pyscript/src/
          cp src/jupyter_notebook.ipynb _site/pyscript/src/
          python scripts/pyscript_gen_packages.py --copy-examples _site/pyscript/src/examples
          # Example + lib MIP manifests; relative urls resolve via packages/ → ../src/
          cp packages/*.json _site/pyscript/packages/
          cp web/landing/index.html _site/index.html
          cp web/landing/site.css _site/site.css
          cp .nojekyll _site/
          # Stamp CACHE_NAME from a hash of the PWA shell (STATIC_ASSETS + sw.js).
          # Example/src churn alone does not change the id — installed apps are
          # only prompted when the offline shell actually changes.
          python scripts/pyscript_stamp_pwa_cache.py _site/pyscript

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
