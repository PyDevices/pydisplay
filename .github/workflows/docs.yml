name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/mkdocs_gen_ref_pages.py'
      - 'src/lib/**'
      - 'src/add_ons/**'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/mkdocs_gen_ref_pages.py'
      - 'src/lib/**'
      - 'src/add_ons/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install MkDocs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build documentation
        run: mkdocs build
