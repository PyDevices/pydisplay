name: Manifest freshness

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'packages/**'
      - 'web/pyscript/**'
      - 'sim/wokwi/**'
      - 'scripts/board_config/**'
      - 'board_configs/**/board_config.py'
      - 'board_configs/**/package.json'
      - 'scripts/install_*'
      - 'scripts/pyscript_gen_packages.py'
      - 'scripts/generate_board_configs.py'
      - 'scripts/audit_board_config_pairs.py'
      - '.github/workflows/manifests.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'packages/**'
      - 'web/pyscript/**'
      - 'sim/wokwi/**'
      - 'scripts/board_config/**'
      - 'board_configs/**/board_config.py'
      - 'board_configs/**/package.json'
      - 'scripts/install_*'
      - 'scripts/pyscript_gen_packages.py'
      - 'scripts/generate_board_configs.py'
      - 'scripts/audit_board_config_pairs.py'
      - '.github/workflows/manifests.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Audit install manifests
        run: ./scripts/install_refresh_manifests.sh --audit

      - name: Check PyScript gallery and example JSON
        run: python scripts/pyscript_gen_packages.py --check

      - name: Check board config manifests
        run: python scripts/generate_board_configs.py --check

      - name: Audit CP/MP board_config pairs
        run: python scripts/audit_board_config_pairs.py
