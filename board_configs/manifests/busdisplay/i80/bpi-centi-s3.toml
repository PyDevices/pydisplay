release_displays()

display_bus = ParallelBus(
    board.GP8,
    board.GP9,
    board.GP10,
    board.GP11,
    board.GP12,
    board.GP13,
    board.GP14,
    board.GP15,
    board.GP5,
    board.GP4,
    board.GP6,
)

