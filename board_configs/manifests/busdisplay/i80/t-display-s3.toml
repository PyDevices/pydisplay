kind = "busdisplay_i80"
slug = "t-display-s3"
title = "T-Display-S3 170x320 ST7789 display"
title_cp = "LilyGO T-Display-S3 170x320 ST7789 I80 — CircuitPython"
out = "busdisplay/i80"
circuitpython = true
mp_preamble = """display_power_pin = Pin(15, Pin.OUT, value=1)
display_rd_pin = Pin(9, Pin.OUT, value=1)
display_reset_pin = Pin(5, Pin.OUT, value=1)
sleep_ms(100)
display_reset_pin.value(0)
sleep_ms(100)
display_reset_pin.value(1)

"""

[display]
module = "st7789"
class = "ST7789"
width = 170
height = 320
colstart = 0
rowstart = 35
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = true
invert = true
brightness = 1.0
backlight_pin = 38
backlight_on_high = true
reset_pin = "None"
reset_high = true
power_pin = "None"
power_on_high = true

[display.cp]
width = 170
height = 320
colstart = 0
rowstart = 35
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = true
invert = true
brightness = 1.0
backlight_pin = "board.D38"
backlight_on_high = true

[bus.mp.i80]
dc = 7
cs = 6
wr = 8
data = [39, 40, 41, 42, 45, 46, 47, 48]

[bus.cp.parallel]
pins = [
    "board.D39", "board.D40", "board.D41", "board.D42",
    "board.D45", "board.D46", "board.D47", "board.D48",
    "board.D7", "board.D6", "board.D8",
]

[package]
display_driver = "st7789"
deps_mp = ["i80bus"]
