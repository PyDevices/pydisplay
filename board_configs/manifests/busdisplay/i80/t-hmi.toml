      ["xpt2046.py", "github:PyDevices/pydisplay/drivers/touch/xpt2046.py"]
    ],
    "deps": [
      ["github:PyDevices/pydisplay/packages/i80bus.json", "main"]
    ],
    "version": "0.1"
  }
"""

[verbatim.cp]
board_config = '''
"""LilyGO T-HMI 240x320 ST7789 I80 + XPT2046 — CircuitPython"""

import board
from displayio import release_displays
from paralleldisplaybus import ParallelBus
from st7789 import ST7789

from adafruit_touchscreen import Touchscreen

import eventsys

release_displays()

display_bus = ParallelBus(
    board.GP48,
    board.GP47,
    board.GP39,
    board.GP40,
    board.GP41,
    board.GP42,
    board.GP45,
    board.GP46,
    board.GP7,
    board.GP6,
    board.GP8,
)

display_drv = ST7789(
    display_bus,
    width=320,
    height=240,
    colstart=0,
    rowstart=0,
    rotation=0,
    mirrored=False,
    color_depth=16,
    bgr=False,
    reverse_bytes_in_word=False,
    invert=True,
    brightness=1.0,
    backlight_pin=board.GP38,
    backlight_on_high=True,
)

touchscreen = Touchscreen(
    board.GP1,
    board.GP2,
    board.GP3,
    board.GP4,
    x_resistance=400,
)


def touch_read_func():
    point = touchscreen.touch_point
    if point:
        return point[0], point[1]
    return None


touch_rotation_table = None

runtime = eventsys.Runtime(
    display=display_drv,
    touch_read=touch_read_func,
    touch_rotation_table=touch_rotation_table,
)
'''
