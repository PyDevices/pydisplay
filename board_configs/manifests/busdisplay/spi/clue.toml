kind = "busdisplay_spi"
slug = "clue"
title = "Adafruit CLUE ST7789 — MicroPython (nRF52840)"
title_cp = "Adafruit CLUE (built-in ST7789) — CircuitPython"
out = "busdisplay/spi"
circuitpython = true

[display]
module = "st7789"
class = "ST7789"
width = 240
height = 240
colstart = 0
rowstart = 80
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = true

[display.cp]
width = 240
height = 240
rotation = 0
colstart = 0
rowstart = 80
bgr = false
reverse_bytes_in_word = true

[bus.mp.spi]
id = 0
baudrate = 24_000_000
sck = 4
mosi = 5
miso = 7
dc = 29
cs = 30
reset = 31

[bus.cp.fourwire]
command = "board.TFT_DC"
chip_select = "board.TFT_CS"
reset = "board.TFT_RESET"
baudrate = 24_000_000

[package]
display_driver = "st7789"
deps_mp = ["spibus"]
