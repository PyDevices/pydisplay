[bus.mp.spi]
id = 0
baudrate = 24_000_000
sck = 22
mosi = 55
miso = 54
dc = 63
cs = 27
reset = 62

[bus.cp.fourwire]
command = "board.TFT_DC"
chip_select = "board.TFT_CS"
reset = "board.TFT_RESET"
