kind = "busdisplay_spi"
slug = "ili9341_pico_uno"
title = "RPi Pico with ILI9341 2.8\" TFT Touch Shield"
title_cp = "Pico + ILI9341 Arduino shield — CircuitPython"
out = "busdisplay/spi"
circuitpython = true

[display]
module = "ili9341"
class = "ILI9341"
width = 240
height = 320
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = true
reverse_bytes_in_word = true
invert = false
brightness = 1.0
backlight_pin = "None"
backlight_on_high = true
reset_pin = "None"
reset_high = true
power_pin = "None"
power_on_high = true

[display.cp]
width = 240
height = 320
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = true
reverse_bytes_in_word = true
invert = false

[bus.mp.spi]
id = 0
baudrate = 62_500_000
sck = 18
mosi = 19
miso = 16
dc = 3
cs = 17

[bus.cp.fourwire]
command = "board.D3"
chip_select = "board.D17"
baudrate = 62_500_000

[touch]
module = "ft6x36"
class = "FT6x36"
read = "get_positions"
rotation_table = [6, 3, 0, 5]

[touch.mp.i2c]
id = 0
sda = 20
scl = 21
freq = 100_000

[package]
display_driver = "ili9341"
touch_driver = "ft6x36"
deps_mp = ["spibus"]
include_displaysys = false
