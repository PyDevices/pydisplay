kind = "busdisplay_spi"
slug = "pyportal_titano"
title = "Adafruit PyPortal Titano ILI9341 + TT21100 — MicroPython (SAMD51)"
title_cp = "Adafruit PyPortal Titano ILI9341 + TT21100 — CircuitPython"
out = "busdisplay/spi"
circuitpython = true

[display]
module = "ili9341"
class = "ILI9341"
width = 320
height = 480
rotation = 0
colstart = 0
rowstart = 0
bgr = true
reverse_bytes_in_word = true

[bus.mp.spi]
id = 0
baudrate = 24_000_000
sck = 13
mosi = 12
miso = 14
dc = 41
cs = 38
reset = 0

[bus.cp.fourwire]
command = "board.TFT_DC"
chip_select = "board.TFT_CS"
reset = "board.TFT_RESET"
baudrate = 24_000_000

[touch]
module = "tt21100"
class = "TT21100"
read_wrapper = true
rotation_table = [0, 0, 0, 0]

[touch.cp]
driver = "tt21100"

[touch.mp.i2c]
id = 1
sda = 34
scl = 35
freq = 400_000

[package]
display_driver = "ili9341"
touch_driver = "tt21100"
deps_mp = ["spibus"]
