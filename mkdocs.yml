site_name: pydisplay
site_url: https://pydisplay.readthedocs.io
repo_url: https://github.com/PyDevices/pydisplay/
edit_uri: edit/main/docs/
copyright: "Copyright 2024, Brad Barnett"
docs_dir: docs
site_dir: site

exclude_docs: |
  NOTES.md
  overrides/**

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
    - toc.integrate

plugins:
- search
- gen-files:
    scripts:
    - scripts/mkdocs_gen_ref_pages.py
    - scripts/mkdocs_gen_notebook_pages.py
- literate-nav:
    nav_file: SUMMARY.md
- section-index
- mkdocs-jupyter:
    include_source: true
    execute: false
    include: ["platforms/jupyter-notebook.ipynb"]
    ignore: ["src/*.ipynb", ".venv*/**/*.ipynb"]
- mkdocstrings:
    handlers:
      python:
        paths: [src/lib, src/add_ons]
        options:
          show_source: false
          show_bases: false
          inherited_members: true
          docstring_style: google
          docstring_section_style: table
          separate_signature: true
          show_category_heading: true
          show_root_heading: true
          members_order: source
          merge_init_into_class: true
          filters:
            - "!^_"
            - "!^__"

nav:
- Home: index.md
- User guide:
  - Try pydisplay:
    - Overview: try/index.md
    - Wokwi details: hardware/wokwi.md
  - Quick start:
    - Router: getting-started.md
    - ESP32 / MicroPython board: guides/esp32-board.md
    - Desktop CPython: guides/desktop-cpython.md
    - Wokwi simulator: guides/wokwi.md
    - PyScript: guides/pyscript.md
    - PyScript asyncio: guides/pyscript-asyncio.md
  - Installation:
    - Choose a method: installation/index.md
    - Full clone: installation/full-clone.md
    - installer.py: installation/installer.md
    - GitHub MIP: installation/mip-github.md
    - micropython-lib MIP: installation/mip-micropython-lib.md
  - Hardware setup:
    - Board configs: hardware/board-configs.md
    - Display drivers: hardware/display-drivers.md
    - Touch drivers: hardware/touch-drivers.md
  - Learn:
    - Architecture: concepts/architecture.md
    - Displays: concepts/displays.md
    - Events: concepts/events.md
    - multimer: concepts/multimer.md
    - Drawing and fonts: concepts/drawing-and-fonts.md
    - Graphics files: concepts/graphics-files.md
    - Config files: concepts/config-files.md
  - Portability & platforms:
    - Overview: platforms/index.md
    - MicroPython: platforms/micropython.md
    - CircuitPython: platforms/circuitpython.md
    - CPython desktop: platforms/cpython-desktop.md
    - Jupyter: platforms/jupyter.md
    - Run interactively: platforms/jupyter-run.md
    - Jupyter notebook: platforms/jupyter-notebook.ipynb
    - PyScript: platforms/pyscript.md
  - Examples:
    - App starter: examples/app-starter.md
    - pydisplay_demo: examples/pydisplay_demo.md
    - Catalog: examples/index.md
    - Live demos: examples/live-demos.md
  - Ecosystem & GUIs:
    - Ecosystem & sister projects: ecosystem.md
    - LVGL: guis/lvgl.md
    - MicroPython-Touch: guis/micropython-touch.md
    - Nano-GUI: guis/nano-gui.md
    - TFT / st7789py ports: guis/tft-gui.md
    - PyWidgets: guis/pywidgets.md
  - Add-ons: add-ons.md
  - Project:
    - Contributing: contributing.md
    - Docstring conventions: contributing/docstrings.md
    - Building docs: building-docs.md
    - Publishing micropython-lib: publishing-micropython-lib.md
    - Getting help: getting-help.md
    - Troubleshooting: troubleshooting.md
- API reference:
  - Package overviews:
    - displaysys: reference/overviews/displaysys.md
    - eventsys: reference/overviews/eventsys.md
    - graphics: reference/overviews/graphics.md
    - multimer: reference/overviews/multimer.md
  - Core modules: reference/
  - Add-ons API: reference/add_ons/

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
