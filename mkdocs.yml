site_name: pydisplay
site_url: https://pydisplay.readthedocs.io
repo_url: https://github.com/PyDevices/pydisplay/
edit_uri: edit/main/docs/
copyright: "Copyright 2024, Brad Barnett"
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
- search
- gen-files:
    scripts:
    - tools/gen_ref_pages.py
- literate-nav:
    nav_file: SUMMARY.md
- section-index
- mkdocstrings:
    handlers:
      python:
        paths: [src/lib]
        options:
          show_source: false
          show_bases: false
          inherited_members: true
          docstring_style: google
          docstring_section_style: table
          separate_signature: true
          show_category_heading: true

nav:
- Home: index.md
- Getting Started: getting-started.md
- Installation:
  - Overview: installation/index.md
  - Full clone: installation/full-clone.md
  - GitHub MIP packages: installation/mip-github.md
  - micropython-lib MIP: installation/mip-micropython-lib.md
  - installer.py: installation/installer.md
- Platforms:
  - MicroPython: platforms/micropython.md
  - CircuitPython: platforms/circuitpython.md
  - CPython desktop: platforms/cpython-desktop.md
  - Jupyter: platforms/jupyter.md
  - PyScript: platforms/pyscript.md
- Hardware:
  - Board configs: hardware/board-configs.md
  - Wokwi: hardware/wokwi.md
  - Display drivers: hardware/display-drivers.md
  - Touch drivers: hardware/touch-drivers.md
- Concepts:
  - Displays: concepts/displays.md
  - Events: concepts/events.md
  - Drawing and fonts: concepts/drawing-and-fonts.md
  - Graphics files: concepts/graphics-files.md
  - Config files: concepts/config-files.md
- GUI libraries:
  - LVGL: guis/lvgl.md
  - MicroPython-Touch: guis/micropython-touch.md
  - Nano-GUI: guis/nano-gui.md
  - TFT examples: guis/tft-gui.md
  - PyWidgets: guis/pywidgets.md
- Examples:
  - Catalog: examples/index.md
  - Live demos: examples/live-demos.md
- Add-ons: add-ons.md
- Package Reference: reference/
- Contributing: contributing.md
- Building docs: building-docs.md
- Getting help: getting-help.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
