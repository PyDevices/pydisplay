kind = "busdisplay_i80"
slug = "bpi-centi-s3"
title = "BPI-Centi-S3 170x320 ST7789 display"
title_cp = "BPI Centi-S3 170x320 ST7789 I80 — CircuitPython"
out = "busdisplay/i80"
circuitpython = true
mp_preamble = "display_rd_pin = Pin(7, Pin.OUT, value=1)\n\n"

[display]
module = "st7789"
class = "ST7789"
width = 170
height = 320
colstart = 35
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = true
invert = true
brightness = 1.0
backlight_pin = 2
backlight_on_high = true
reset_pin = 3
reset_high = true
power_pin = "None"
power_on_high = true

[display.cp]
width = 170
height = 320
colstart = 35
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = true
invert = true
brightness = 1.0
backlight_pin = "board.GP2"
backlight_on_high = true
reset_pin = "board.GP3"
reset_high = true

[bus.mp.i80]
dc = 5
cs = 4
wr = 6
data = [8, 9, 10, 11, 12, 13, 14, 15]

[bus.cp.parallel]
pins = [
    "board.GP8", "board.GP9", "board.GP10", "board.GP11",
    "board.GP12", "board.GP13", "board.GP14", "board.GP15",
    "board.GP5", "board.GP4", "board.GP6",
]

[input.encoder]
module = "rotary_irq_esp"
class = "RotaryIRQ"
pin_a = 37
pin_b = 47
pull_up = true
half_step = true
button_pin = 35
button_active_low = true

[package]
display_driver = "st7789"
deps_mp = ["i80bus"]
include_displaysys = false
