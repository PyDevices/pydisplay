kind = "busdisplay_i80"
slug = "t-hmi"
title = "T-HMI 240x320 ST7789V display"
title_cp = "LilyGO T-HMI 240x320 ST7789 I80 + XPT2046 — CircuitPython"
out = "busdisplay/i80"
circuitpython = true

[display]
module = "st7789"
class = "ST7789"
width = 320
height = 240
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = false
invert = true
brightness = 1.0
backlight_pin = 38
backlight_on_high = true
reset_pin = "None"
reset_high = true
power_pin = "None"
power_on_high = true

[display.cp]
width = 320
height = 240
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = false
invert = true
brightness = 1.0
backlight_pin = "board.GP38"
backlight_on_high = true

[bus.mp.i80]
dc = 7
cs = 6
wr = 8
data = [48, 47, 39, 40, 41, 42, 45, 46]

[bus.cp.parallel]
pins = [
    "board.GP48", "board.GP47", "board.GP39", "board.GP40",
    "board.GP41", "board.GP42", "board.GP45", "board.GP46",
    "board.GP7", "board.GP6", "board.GP8",
]

[touch]
type = "xpt2046"
module = "xpt2046"
class = "Touch"
read = "get_touch"
rotation_null = true

[touch.mp.spi]
id = 1
baudrate = 1_000_000
cs = 2
int_pin = 9

[touch.calibrate]
xmin = 150
xmax = 1830
ymin = 150
ymax = 1830
width = "display_drv.width"
height = "display_drv.height"
orientation = 1

[touch.cp]
pins = ["board.GP1", "board.GP2", "board.GP3", "board.GP4"]
x_resistance = 400

[package]
display_driver = "st7789"
touch_driver = "xpt2046"
deps_mp = ["i80bus"]
