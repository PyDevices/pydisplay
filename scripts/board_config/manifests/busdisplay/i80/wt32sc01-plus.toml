kind = "busdisplay_i80"
slug = "wt32sc01-plus"
title = "WT32-SC01 Plus 320x480 ST7796 display"
title_cp = "WT32-SC01 Plus 320x480 ST7796 I80 + FT6x36 — CircuitPython"
out = "busdisplay/i80"
circuitpython = true
mp_preamble = """# The WT32-SC01 Plus has the reset pins of the display IC and the touch IC both
# tied to pin 4.  Controlling this pin with the display driver can lead to an
# unresponsive touchscreen.  This case is uncommon.  If they aren't tied
# together on your board, define reset in ST7796 instead, like:
#    ST7796(reset=4)
reset = Pin(4, Pin.OUT, value=1)

"""

[display]
module = "st7796"
class = "ST7796"
width = 320
height = 480
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = true
reverse_bytes_in_word = true
invert = true
brightness = 1.0
backlight_pin = 45
backlight_on_high = true
reset_pin = "None"
reset_high = true
power_pin = "None"
power_on_high = true

[display.cp]
width = 320
height = 480
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = true
reverse_bytes_in_word = true
invert = true
brightness = 1.0
backlight_pin = "board.GP45"
backlight_on_high = true

[bus.mp.i80]
dc = 0
cs = 6
wr = 47
data = [9, 46, 3, 8, 18, 17, 16, 15]

[bus.cp.parallel]
pins = [
    "board.GP9", "board.GP46", "board.GP3", "board.GP8",
    "board.GP18", "board.GP17", "board.GP16", "board.GP15",
    "board.GP0", "board.GP6", "board.GP47",
]

[touch]
module = "ft6x36"
class = "FT6x36"
read = "get_positions"
rotation_null = true

[touch.mp.i2c]
id = 0
sda = 6
scl = 5
freq = 100_000

[package]
display_driver = "st7796"
touch_driver = "ft6x36"
deps_mp = ["i80bus"]
include_displaysys = false
