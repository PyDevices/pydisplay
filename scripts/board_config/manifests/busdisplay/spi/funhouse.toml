kind = "busdisplay_spi"
slug = "funhouse"
title = "Adafruit FunHouse ST7789 + TT21100 — MicroPython (ESP32-S2)"
title_cp = "Adafruit FunHouse ST7789 + TT21100 touch — CircuitPython"
out = "busdisplay/spi"
circuitpython = true

[display]
module = "st7789"
class = "ST7789"
width = 240
height = 240
colstart = 0
rowstart = 80
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = true

[bus.mp.spi]
id = 1
baudrate = 24_000_000
sck = 36
mosi = 35
miso = -1
dc = 39
cs = 40
reset = 41

[bus.cp.fourwire]
command = "board.TFT_DC"
chip_select = "board.TFT_CS"
reset = "board.TFT_RESET"
baudrate = 24_000_000

[touch]
module = "tt21100"
class = "TT21100"
read_wrapper = true
rotation_table = [0, 0, 0, 0]

[touch.cp]
driver = "tt21100"

[touch.mp.i2c]
id = 0
sda = 34
scl = 33
freq = 400_000

[package]
display_driver = "st7789"
touch_driver = "tt21100"
deps_mp = ["spibus"]
