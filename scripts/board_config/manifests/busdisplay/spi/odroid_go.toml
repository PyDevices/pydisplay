kind = "busdisplay_spi"
slug = "odroid_go"
title = "ODROID GO with ILI9341 2.4\" display"
title_cp = "ODROID-GO ILI9341 2.4\" — CircuitPython"
out = "busdisplay/spi"
circuitpython = true

[display]
module = "ili9341"
class = "ILI9341"
width = 240
height = 320
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = true
reverse_bytes_in_word = true
invert = false
brightness = 1.0
backlight_pin = 14
backlight_on_high = true
reset_pin = "None"
reset_high = true
power_pin = "None"
power_on_high = true

[display.cp]
width = 240
height = 320
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = true
reverse_bytes_in_word = true
invert = false
brightness = 1.0
backlight_pin = "board.TFT_BACKLIGHT"
backlight_on_high = true

[bus.mp.spi]
id = 2
baudrate = 60_000_000
sck = 18
mosi = 23
miso = 19
dc = 21
cs = 5

[bus.cp.fourwire]
command = "board.TFT_DC"
chip_select = "board.TFT_CS"
baudrate = 60_000_000

[package]
display_driver = "ili9341"
deps_mp = ["spibus"]
