kind = "busdisplay_spi"
slug = "pybadge"
title = "Adafruit PyBadge LC ST7789 + shift-register buttons — MicroPython (SAMD51)"
title_cp = "Adafruit PyBadge LC ST7789 320x240 — CircuitPython"
out = "busdisplay/spi"
circuitpython = true

[display]
module = "st7789"
class = "ST7789"
width = 320
height = 240
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = true

[display.cp]
width = 320
height = 240
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = true

[bus.mp.spi]
id = 0
baudrate = 24_000_000
sck = 45
mosi = 47
miso = 46
dc = 37
cs = 39
reset = 0

[bus.cp.fourwire]
command = "board.TFT_DC"
chip_select = "board.TFT_CS"
reset = "board.TFT_RESET"
baudrate = 24_000_000

[input.keypad_shift]
clock = 63
latch = 32
data = 62
mapping = "PYBADGE_BUTTON_MAP"

[input.keypad_gpio]
keys = "MAGTAG_BUTTON_KEYS"
buttons = { a = "board.BUTTON_A", b = "board.BUTTON_B", c = "board.BUTTON_C", d = "board.BUTTON_D" }

[package]
display_driver = "st7789"
deps_mp = ["spibus"]
