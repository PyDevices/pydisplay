kind = "busdisplay_spi"
slug = "pygamer"
title = "Adafruit PyGamer ST7789 — MicroPython (SAMD51)"
title_cp = "Adafruit PyGamer ST7789 — CircuitPython"
out = "busdisplay/spi"
circuitpython = true

[display]
module = "st7789"
class = "ST7789"
width = 160
height = 128
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = true

[bus.mp.spi]
id = 0
baudrate = 24_000_000
sck = 13
mosi = 11
miso = 12
dc = 39
cs = 7
reset = 47

[bus.cp.fourwire]
command = "board.TFT_DC"
chip_select = "board.TFT_CS"
reset = "board.TFT_RESET"
baudrate = 24_000_000

[package]
display_driver = "st7789"
deps_mp = ["spibus"]
