kind = "busdisplay_spi"
slug = "t-embed"
title = "T-Embed ST7789 display with encoder"
title_cp = "LilyGo T-Embed ST7789 170x320 — CircuitPython"
out = "busdisplay/spi"
circuitpython = true

[display]
module = "st7789"
class = "ST7789"
width = 170
height = 320
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = true
invert = false
brightness = 1.0
backlight_pin = 15
backlight_on_high = true
reset_pin = "None"
reset_high = true
power_pin = "None"
power_on_high = true

[display.cp]
width = 170
height = 320
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = false
reverse_bytes_in_word = true
invert = false
brightness = 1.0
backlight_pin = "board.D15"
backlight_on_high = true

[bus.mp.spi]
id = 1
baudrate = 60_000_000
sck = 12
mosi = 11
miso = -1
dc = 13
cs = 10

[bus.cp.fourwire]
command = "board.D13"
chip_select = "board.D10"
baudrate = 60_000_000

[input.encoder]
module = "rotary_irq_esp"
class = "RotaryIRQ"
pin_a = 1
pin_b = 2
pull_up = true
half_step = true
button_pin = 0
button_active_low = true

[package]
display_driver = "st7789"
deps_mp = ["spibus"]
include_displaysys = false
