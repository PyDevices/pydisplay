kind = "busdisplay_spi"
slug = "t-qt-pro"
title = "LILYGO T-QT Pro GC9107 128x128 display"
title_cp = "LILYGO T-QT Pro GC9107 128x128 — CircuitPython"
out = "busdisplay/spi"
circuitpython = true

[display]
module = "gc9a01"
class = "GC9A01"
width = 128
height = 128
colstart = 0
rowstart = 0
rotation = 180
mirrored = false
color_depth = 16
bgr = true
reverse_bytes_in_word = true
invert = true
brightness = 1.0
backlight_pin = 10
backlight_on_high = true
reset_pin = 1
reset_high = true
power_pin = "None"
power_on_high = true

[display.cp]
width = 128
height = 128
colstart = 0
rowstart = 0
rotation = 180
mirrored = false
color_depth = 16
bgr = true
reverse_bytes_in_word = true
invert = true
brightness = 1.0
backlight_pin = "board.GP10"
backlight_on_high = true

[bus.mp.spi]
id = 1
baudrate = 60_000_000
sck = 3
mosi = 2
dc = 6
cs = 5

[bus.cp.fourwire]
command = "board.GP6"
chip_select = "board.GP5"
reset = "board.GP1"
baudrate = 60_000_000

[package]
display_driver = "gc9a01"
deps_mp = ["spibus"]
