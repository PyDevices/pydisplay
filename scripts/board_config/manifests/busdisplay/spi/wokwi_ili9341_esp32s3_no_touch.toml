kind = "busdisplay_spi"
slug = "wokwi_ili9341_esp32s3_no_touch"
title = "Wokwi ESP32S3 and ILI9341 Display"
out = "busdisplay/spi"
circuitpython = false

[display]
module = "ili9341"
class = "ILI9341"
width = 240
height = 320
colstart = 0
rowstart = 0
rotation = 0
mirrored = false
color_depth = 16
bgr = true
reverse_bytes_in_word = true
invert = false
brightness = 1.0
backlight_pin = "None"
