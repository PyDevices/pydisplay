kind = "fbdisplay_mipidsi"
slug = "m5stack_tab5_st7123"
title = "M5Stack Tab5 (ST7123 TDDI) - MicroPython"
out = "fbdisplay"
circuitpython = false
port = "esp32p4"
touch_before_display = true

mp_imports = ["import time", "from pi4ioe5v import tab5_init_lcd_reset"]

mp_preamble_after_pins = """
i2c = I2C(0, scl=Pin(I2C_SCL), sda=Pin(I2C_SDA), freq=400_000)
tab5_init_lcd_reset(i2c)
time.sleep_ms(100)
"""

[bus]
frequency = 965_000_000
num_lanes = 2

[display]
init_sequence_name = "TAB5_ST7123_INIT"
init_sequence_ref = true
init_sequence_module = "tab5_st7123_init"
width = 720
height = 1280
color_depth = 16
pixel_clock_frequency = 70_000_000
hsync_pulse_width = 2
hsync_front_porch = 40
hsync_back_porch = 40
vsync_pulse_width = 2
vsync_front_porch = 220
vsync_back_porch = 8
backlight_pin = "LCD_BACKLIGHT"
backlight_on_high = true

[pins.mp]
I2C_SCL = 32
I2C_SDA = 31
LCD_BACKLIGHT = 22
TOUCH_INT = 23

[touch]
module = "st7123"
class = "ST7123"
rotation_table = [0, 0, 0, 0]

[touch.mp.i2c]
id = 0
scl = "I2C_SCL"
sda = "I2C_SDA"
freq = 400_000
reuse_i2c = true

[touch.chip]
irq_pin = "Pin(TOUCH_INT)"
width = 720
height = 1280

[package]
touch_driver = "st7123"
include_mipidsi = true

[[package.urls_mp]]
name = "pi4ioe5v.py"
url = "github:PyDevices/pydisplay/drivers/io_expander/pi4ioe5v.py"

[[package.urls_mp]]
name = "tab5_st7123_init.py"
url = "github:PyDevices/pydisplay/drivers/display/tab5_st7123_init.py"
