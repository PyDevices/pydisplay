kind = "fbdisplay_rgbframebuffer"
slug = "mimxrt1060_evk_rk043_rgb"
title = "NXP MIMXRT1060-EVK + RK043FN66HS-CTG 4.3\" parallel RGB - MicroPython"
title_cp = "NXP MIMXRT1060-EVK + RK043FN66HS-CTG 4.3\" parallel RGB — CircuitPython"
out = "fbdisplay"
circuitpython = true
port = "mimxrt1062"
mp_pin_wrap = true
mp_lcd_reset_pulse = true
cp_native_rgbframebuffer = true
cp_preamble = """
board.LCD_BACKLIGHT.value = True

board.LCD_RST.value = False
time.sleep(0.01)
board.LCD_RST.value = True
time.sleep(0.12)

"""

[pins.mp]
LCD_BACKLIGHT = 'Pin("GPIO_B1_15", Pin.OUT, value=1)'
LCD_RESET = 'Pin("GPIO_AD_B0_02", Pin.OUT, value=1)'

[tft_pins.mp]
de = "GPIO_B0_01"
vsync = "GPIO_B0_03"
hsync = "GPIO_B0_02"
dclk = "GPIO_B0_00"
data = [
  "GPIO_B0_04", "GPIO_B0_05", "GPIO_B0_06", "GPIO_B0_07",
  "GPIO_B0_08", "GPIO_B0_09", "GPIO_B0_10", "GPIO_B0_11",
  "GPIO_B0_12", "GPIO_B0_13", "GPIO_B0_14", "GPIO_B0_15",
  "GPIO_B1_00", "GPIO_B1_01", "GPIO_B1_02", "GPIO_B1_03",
]

[tft_pins.cp]
de = "board.LCD_ENABLE"
vsync = "board.LCD_VSYNC"
hsync = "board.LCD_HSYNC"
dclk = "board.LCD_CLK"
data = [
  "board.LCD_D0", "board.LCD_D1", "board.LCD_D2", "board.LCD_D3",
  "board.LCD_D4", "board.LCD_D5", "board.LCD_D6", "board.LCD_D7",
  "board.LCD_D8", "board.LCD_D9", "board.LCD_D10", "board.LCD_D11",
  "board.LCD_D12", "board.LCD_D13", "board.LCD_D14", "board.LCD_D15",
]

[tft_timings]
frequency = 9_000_000
width = 480
height = 272
hsync_pulse_width = 41
hsync_front_porch = 4
hsync_back_porch = 8
vsync_pulse_width = 10
vsync_front_porch = 4
vsync_back_porch = 2
hsync_idle_low = true
vsync_idle_low = true
de_idle_high = false
pclk_active_high = false
pclk_idle_high = false

[touch]
module = "gt911"
class = "GT911"
rotation_table = [0, 0, 0, 0]

[touch.mp.i2c]
id = 0
freq = 400_000

[touch.chip]
reset_pin = "GPIO_AD_B0_02"
irq_pin = "GPIO_AD_B0_11"
width = 480
height = 272
touch_points = 5

[touch.cp]
driver = "gt911"
reset_pin = "board.LCD_RST"
address = "0x5D"

[package]
touch_driver = "gt911"
include_rgbframebuffer = true
