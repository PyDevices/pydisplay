# Canonical runtime targets for cross-runtime example tests.
# Agents: read this file and .cursor/example-runtimes.md before running the matrix.
#
# Run from repo root:
#   python tools/example_test_kit.py

[defaults]
duration_s = 5
timeout_s = 30
oneshot_timeout_s = 15

# Subprocess interpreters — cwd is src/ unless noted.

[runtimes.micropython]
platform = "micropython"
display_backend = "SDLDisplay"
available_on = ["linux", "wsl", "macos"]
kind = "subprocess"
command = ["micropython"]
cwd = "src"
resolve = ["PATH", "~/bin/micropython", "repo:bin/micropython"]
setup_notes = "MicroPython unix build with SDL display support. Falls back to bin/micropython (committed copy) when ~/bin and PATH don't have it, e.g. in a Cursor Cloud checkout."

[runtimes."micropython.exe"]
platform = "micropython"
display_backend = "SDLDisplay"
available_on = ["windows", "wsl"]
kind = "subprocess"
command = ["micropython.exe"]
cwd = "src"
resolve = ["PATH", "~/bin/micropython.exe", "repo:bin/micropython.exe"]
setup_notes = "MicroPython Windows (.exe). Async modes may be limited. bin/micropython.exe is committed for completeness only — Cursor Cloud agents cannot execute Windows binaries, so this runtime is not part of the cloud matrix."
timeout_s = 60

[runtimes.circuitpython]
platform = "circuitpython"
display_backend = "SDLDisplay"
available_on = ["linux", "wsl", "macos"]
kind = "subprocess"
command = ["circuitpython"]
cwd = "src"
resolve = ["PATH", "~/bin/circuitpython", "repo:bin/circuitpython"]
setup_notes = "CircuitPython unix with SDL. Falls back to bin/circuitpython (committed copy) when ~/bin and PATH don't have it, e.g. in a Cursor Cloud checkout."

[runtimes.cpython-venv]
platform = "cpython"
display_backend = "SDLDisplay"
available_on = ["linux", "wsl", "macos"]
kind = "subprocess"
command = [".venv/bin/python"]
cwd = "src"
resolve = ["repo:.venv/bin/python"]
setup_notes = "Repo-root .venv (source .venv/bin/activate equivalent)."

[runtimes."python.exe"]
platform = "cpython"
display_backend = "SDLDisplay"
available_on = ["windows", "wsl"]
kind = "subprocess"
command = ["python.exe"]
cwd = "src"
resolve = ["PATH", "~/bin/python.exe"]
setup_notes = "Windows CPython on PATH."

# Launcher runtimes — cwd is repo root.

[runtimes.pyscript]
platform = "pyscript"
display_backend = "PSDisplay"
available_on = ["linux", "wsl", "macos", "windows"]
kind = "pyscript"
status = "active"
command_template = ["./tools/pyscript.sh", "--module", "{example}", "--no-open"]
cwd = "."
setup_notes = "Requires tools/serve.py on port 8000. Autotest uses embed.html?autotest=1. Headless: .venv/bin/pip install -r requirements-dev.txt && .venv/bin/playwright install chromium"

[runtimes.jupyter]
platform = "jupyter"
display_backend = "JNDisplay"
available_on = ["linux", "wsl", "macos"]
kind = "jupyter"
status = "active"
command_template = ["./tools/jupyter.sh", "{example}", "--no-open"]
cwd = "."
setup_notes = "Requires .venv with jupyterlab, ipywidgets, ipyevents, pillow. Executes generated src/run-{example}.ipynb."
