# Per-example metadata for tools/example_test_kit.py
# Inventory of all files: packages/examples.json (regenerate via ./scripts/install_refresh_manifests.sh)
#
# kind: oneshot | loop | async | lvgl | pdwidgets | harness | legacy
# quit: native_exit | poll | inject | pending | interactive
# bootstrap: full (default) | headless — headless skips lib.path / display init

[defaults]
duration_s = 5
timeout_s = 30
oneshot_timeout_s = 15

# --- v1 curated (high-signal) ---

[examples.pydisplay_demo]
import = "pydisplay_demo"
script = "examples/pydisplay_demo.py"
kind = "async"
quit = "poll"
deps = ["core"]

[examples.calc_graphics]
import = "calc_graphics"
script = "examples/calc_graphics.py"
kind = "async"
quit = "poll"
deps = ["core"]

[examples.calc_widgets]
import = "calc_widgets"
script = "examples/calc_widgets.py"
kind = "pdwidgets"
quit = "inject"
deps = ["add_ons"]
timeout_s = 45

[examples.calc_lvgl]
import = "calc_lvgl"
script = "examples/calc_lvgl.py"
kind = "lvgl"
quit = "inject"
deps = ["lvgl"]
timeout_s = 45

[examples.paint]
import = "paint"
script = "examples/paint.py"
kind = "async"
quit = "poll"
deps = ["core"]

[examples.eventsys_simpletest]
import = "eventsys_simpletest"
script = "examples/eventsys_simpletest.py"
kind = "async"
quit = "poll"
deps = ["core"]

[examples.graphics_simpletest]
import = "graphics_simpletest"
script = "examples/graphics_simpletest.py"
kind = "oneshot"
quit = "native_exit"
deps = ["core"]
oneshot_timeout_s = 20

[examples.framebuf_simpletest]
import = "framebuf_simpletest"
script = "examples/framebuf_simpletest.py"
kind = "oneshot"
quit = "native_exit"
deps = ["core"]
