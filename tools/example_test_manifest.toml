[examples.color_test]
import = "color_test"
script = "examples/color_test.py"
kind = "loop"
quit = "poll"
deps = ["add_ons", "tft_config"]

[examples.chango]
import = "chango.chango"
script = "examples/chango/chango.py"
kind = "loop"
quit = "inject"
deps = ["add_ons", "tft_config"]

# --- LVGL timer smoke test (matrix) ---
# Also covered by tools/lv_timer_test_kit.py (``lv_test_timer.py kit``).
# Follows runtime.timer_async; does not set PYDISPLAY_TIMER_ASYNC itself.

[examples.lv_test_timer]
import = "lv_test_timer"
script = "examples/lv_test_timer.py"
kind = "lvgl"
quit = "inject"
deps = ["lvgl"]
duration_s = 5
timeout_s = 45

