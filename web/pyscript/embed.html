<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./mini-coi-fd.js"></script>
<script type="module" src="./vendor/core.js"></script>
<link rel="stylesheet" href="./vendor/core.css">
</head>
<body>
<canvas id="display_canvas" width="320" height="480" tabindex="0"></canvas>
<div id="log" style="display:none;white-space:pre-wrap;overflow:auto;max-height:40vh;border:1px solid #888;padding:8px;margin-top:8px;font-family:monospace;font-size:12px"></div>
<script>
(function () {
    var SAFE = /^[a-zA-Z_][a-zA-Z0-9_]*$/;
    var SAFE_PACKAGE = /^[a-zA-Z0-9][a-zA-Z0-9_-]*$/;

    function parseList(raw) {
        return raw.split(',').map(function (s) {
            s = s.trim();
            if (s.toLowerCase().endsWith('.py')) {
                s = s.slice(0, -3);
            }
            return s;
        }).filter(Boolean);
    }

    function parseQuery(search) {
        var modules = [];
        var manifests = [];
        var packages = [];
        var entryKind = null;
        var entryName = null;
        var debug = false;
        var autotest = false;
        var autotestDuration = 5;
        var raw = search.startsWith('?') ? search.slice(1) : search;
        raw.split('&').forEach(function (part) {
            if (!part) {
                return;
            }
            var eq = part.indexOf('=');
            var key = eq === -1 ? part : decodeURIComponent(part.slice(0, eq));
            var val = eq === -1 ? '' : decodeURIComponent(part.slice(eq + 1).replace(/\+/g, ' '));
            if (key === 'modules') {
                var list = parseList(val);
                if (!entryKind && list.length) {
                    entryKind = 'module';
                    entryName = list[0];
                }
                modules.push.apply(modules, list);
            } else if (key === 'manifests') {
                var list = parseList(val);
                if (!entryKind && list.length) {
                    entryKind = 'manifest';
                    entryName = list[0];
                }
                manifests.push.apply(manifests, list);
            } else if (key === 'packages') {
                packages.push.apply(packages, parseList(val));
            } else if (key === 'debug') {
                debug = val === '' || /^(1|true|yes)$/i.test(val);
            } else if (key === 'autotest') {
                autotest = val === '' || /^(1|true|yes)$/i.test(val);
            } else if (key === 'duration') {
                var n = parseInt(val, 10);
                if (!isNaN(n) && n > 0) {
                    autotestDuration = n;
                }
            }
        });
        return {
            modules: modules,
            manifests: manifests,
            packages: packages,
            entryKind: entryKind,
            entryName: entryName,
            debug: debug,
            autotest: autotest,
            autotestDuration: autotestDuration,
        };
    }

    function invalidNames(plan) {
        var bad = [];
        plan.modules.forEach(function (name) {
            if (!SAFE.test(name)) {
                bad.push(name);
            }
        });
        plan.manifests.forEach(function (name) {
            if (!SAFE.test(name)) {
                bad.push(name);
            }
        });
        plan.packages.forEach(function (name) {
            if (!SAFE_PACKAGE.test(name)) {
                bad.push(name);
            }
        });
        return bad;
    }

    var plan = parseQuery(window.location.search);
    if (invalidNames(plan).length) {
        window.__pydisplayLoaderDisabled = true;
        return;
    }

    var log = document.getElementById('log');
    if (plan.debug) {
        log.style.display = 'block';
    }

    window.__pydisplayModules = plan.modules.join(',');
    window.__pydisplayManifests = plan.manifests.join(',');
    window.__pydisplayPackages = plan.packages.join(',');
    window.__pydisplayEntryKind = plan.entryKind || '';
    window.__pydisplayEntry = plan.entryName || '';
    window.__pydisplayDebug = plan.debug ? '1' : '';
    window.__pydisplayAutotest = plan.autotest ? '1' : '';
    window.__pydisplayAutotestDuration = String(plan.autotestDuration);

    if (plan.autotest && plan.entryName) {
        setTimeout(function () {
            var payload = {
                example: plan.entryName,
                status: 'ok',
                runtime: 'pyscript',
                duration_s: plan.autotestDuration,
                smoke: 'js_timer'
            };
            console.log('EXAMPLE_RESULT=' + JSON.stringify(payload));
        }, plan.autotestDuration * 1000);
    }
})();
</script>
<script type="mpy" config="./pyscript.toml" output="log">
import builtins
from js import document
import sys

# Loader trace: emits `MARK:<step>` console lines for debugging the PyScript
# bootstrap (mip install, imports, entry). Opt-in only — no-op unless the page
# is loaded with `?debug=1`, so normal gallery visitors see no console noise.
def _mark(step, **data):
    try:
        from js import window, console

        flag = str(getattr(window, "__pydisplayDebug", "") or "").strip().lower()
        if flag not in ("1", "true", "yes"):
            return
        extra = "" if not data else " " + " ".join("%s=%s" % (k, v) for k, v in data.items())
        console.log("MARK:" + step + extra)
    except Exception:
        pass


_mark("mpy_top")

MANIFEST_MIP_TARGET = "examples"

def _log_print(*args, **kwargs):
    el = document.getElementById("log")
    if el is not None:
        sep = kwargs.get("sep", " ")
        end = kwargs.get("end", "\n")
        el.textContent += sep.join(str(a) for a in args) + end
        el.scrollTop = el.scrollHeight

builtins.print = _log_print

def _from_window(name, default=""):
    from js import window
    return str(getattr(window, name, default) or default).strip()

def _autotest_enabled():
    return _from_window("__pydisplayAutotest") in ("1", "true", "yes")

_autotest_sent = [False]

def _autotest_duration_s():
    try:
        return int(_from_window("__pydisplayAutotestDuration", "5"))
    except ValueError:
        return 5

def _post_debug(payload):
    try:
        from js import JSON, fetch

        fetch(
            "/__debug/example_autotest",
            {
                "method": "POST",
                "headers": {"Content-Type": "application/json"},
                "body": JSON.stringify(payload),
            },
        )
    except Exception:
        pass

def _print_example_result(payload):
    import json

    line = "EXAMPLE_RESULT=" + json.dumps(payload, separators=(",", ":"))
    print(line)
    try:
        from js import console

        console.log(line)
    except Exception:
        pass

def _finish_autotest(entry):
    if _autotest_sent[0]:
        return
    _autotest_sent[0] = True

    duration = _autotest_duration_s()
    try:
        from board_config import display_drv

        backend = type(display_drv).__name__
    except Exception as exc:
        backend = "error:{!r}".format(exc)
    result = {
        "example": entry,
        "status": "ok",
        "backend": backend,
        "duration_s": duration,
        "quit_injected": False,
        "runtime": "pyscript",
    }
    _print_example_result(result)
    _post_debug(result)


async def _autotest_after_import(entry):
    try:
        import asyncio
    except ImportError:
        import uasyncio as asyncio

    await asyncio.sleep(_autotest_duration_s())
    _finish_autotest(entry)


def _schedule_pyscript_autotest(entry):
    """Arm quit injection before import — loop demos block the asyncio loop."""
    duration = _autotest_duration_s()
    try:
        import multimer
    except ImportError:
        try:
            import asyncio
        except ImportError:
            import uasyncio as asyncio
        asyncio.create_task(_autotest_after_import(entry))
        return

    def on_quit(_timer):
        _finish_autotest(entry)

    Timer = getattr(multimer, "Timer", None)
    if Timer is None:
        from js import setTimeout

        setTimeout(lambda: _finish_autotest(entry), int(duration * 1000))
        return
    quit_timer = Timer(-1)
    quit_timer.init(mode=Timer.ONE_SHOT, period=int(duration * 1000), callback=on_quit)

def _install_test_mode():
    if not _autotest_enabled():
        return

    class _PyDisplayTestMode:
        pass

    mode = _PyDisplayTestMode()
    mode.ENABLED = True
    mode.DURATION_S = _autotest_duration_s()
    mode._start_s = None
    mode._deadline_fired = False
    sys.modules["pydisplay_test_mode"] = mode

    def _deadline_hook():
        if getattr(mode, "_deadline_fired", False):
            return True
        import time

        now = time.time()
        start = getattr(mode, "_start_s", None)
        if start is None:
            mode._start_s = now
            return False
        if now - start < float(mode.DURATION_S):
            return False
        mode._deadline_fired = True
        try:
            import board_config

            rt = getattr(board_config, "runtime", None)
            if rt is not None:
                request = getattr(rt, "request_quit", None)
                if callable(request):
                    request()
                elif not getattr(rt, "quit_requested", False):
                    handle = getattr(rt, "_handle_quit", None)
                    if callable(handle):
                        handle()
        except Exception:
            pass
        return True

    try:
        import multimer

        multimer.set_deadline_hook(_deadline_hook)
    except ImportError:
        pass

def _parse_comma(raw):
    names = []
    for part in str(raw).split(","):
        name = part.strip()
        if name.lower().endswith(".py"):
            name = name[:-3]
        if name:
            names.append(name)
    return names

def _loader_plan():
    modules = _parse_comma(_from_window("__pydisplayModules"))
    manifests = _parse_comma(_from_window("__pydisplayManifests"))
    packages = _parse_comma(_from_window("__pydisplayPackages"))
    entry = _from_window("__pydisplayEntry")
    if not entry and modules:
        entry = modules[0]
    elif not entry and manifests:
        entry = manifests[0]
    return modules, manifests, packages, entry

def _mip_base():
    host = document.location.hostname
    path = document.location.pathname
    site_root = path[: path.rfind("/") + 1] if "/" in path else "/"
    if host in ("127.0.0.1", "localhost") or host.endswith(".github.io"):
        return document.location.origin + site_root
    return "github:PyDevices/pydisplay/web/pyscript/"

def _packages_from_entry(entry):
    for path in ("examples/" + entry + ".py", entry + ".py"):
        try:
            with open(path) as f:
                for i, line in enumerate(f):
                    if i >= 10:
                        break
                    s = line.strip()
                    if s.startswith("# pyscript packages:"):
                        body = s.split(":", 1)[1].strip()
                        return [p.strip() for p in body.split(",") if p.strip()]
        except OSError:
            continue
    return []

def _install_packages(packages):
    if not packages:
        return
    import sys

    if "/add_ons" not in sys.path:
        sys.path.insert(0, "/add_ons")
    from fetch_ph_gui import fetch_ph_gui

    for which in packages:
        print("Installing package:", which)
        # Pre-seed only — patches need SSD from color_setup / hardware_setup / touch_setup.
        if not fetch_ph_gui(which, apply_patches=False):
            raise RuntimeError("Failed to install " + which)

def _run():
    # #region loader trace
    _mark("run_start")
    # #endregion
    if _from_window("__pydisplayLoaderDisabled"):
        return
    modules, manifests, packages, entry = _loader_plan()
    if not entry:
        return
    # #region loader trace
    _mark("plan", entry=entry, modules=",".join(modules), manifests=",".join(manifests), packages=",".join(packages))
    _mark("before_import_mip")
    # #endregion
    import mip
    # #region loader trace
    _mark("after_import_mip")
    # #endregion
    mip_base = _mip_base()
    for name in manifests:
        # #region loader trace
        _mark("before_mip_manifest", name=name)
        # #endregion
        mip.install(mip_base + name + ".json", target=MANIFEST_MIP_TARGET)
        # #region loader trace
        _mark("after_mip_manifest", name=name)
        # #endregion
    for name in modules:
        # #region loader trace
        _mark("before_mip_module", name=name)
        # #endregion
        mip.install(mip_base + "src/examples/" + name + ".py")
        # #region loader trace
        _mark("after_mip_module", name=name)
        # #endregion
    # #region loader trace
    _mark("before_import_lib_path")
    # #endregion
    import lib.path  # add_ons on path before fetch_ph_gui / packages
    # #region loader trace
    _mark("after_import_lib_path")
    # #endregion
    if not packages:
        packages = _packages_from_entry(entry)
    if packages:
        # #region loader trace
        _mark("before_install_packages", packages=",".join(packages))
        # #endregion
        _install_packages(packages)
        # #region loader trace
        _mark("after_install_packages")
        # #endregion
    if _autotest_enabled():
        _install_test_mode()
        _schedule_pyscript_autotest(entry)
    # #region loader trace
    _mark("before_import_entry", entry=entry)
    # #endregion
    __import__(entry)
    # #region loader trace
    _mark("after_import_entry", entry=entry)
    # #endregion
    if _autotest_enabled() and not _autotest_sent[0]:
        try:
            import asyncio
        except ImportError:
            import uasyncio as asyncio
        asyncio.create_task(_autotest_after_import(entry))

_run()
</script>
